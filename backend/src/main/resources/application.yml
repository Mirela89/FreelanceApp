spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/freelancedb
    username: freelance_user
    password: freelance_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
server:
  port: 8081